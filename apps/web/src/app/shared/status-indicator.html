<div
  class="w-16 h-16 sm:w-20 sm:h-20 mx-auto mb-6 rounded-full flex items-center justify-center"
  [ngClass]="{
    'bg-[#00c752]/10': statusState().state === 'idle' || statusState().state === 'loading' || statusState().state === 'success',
    'bg-red-600/10': statusState().state === 'error'
  }"
>
  @switch (statusState().state) {

    @case ('loading') {
      <span class="text-3xl sm:text-4xl animate-spin">⏳</span>
    }

    @case ('error') {
      <span class="text-3xl sm:text-4xl">⚠️</span>
    }

    @case ('success') {
      <span class="text-3xl sm:text-4xl">✅</span>
    }

    @default {
      <span class="text-2xl sm:text-3xl text-[#00c752]">⚡</span>
    }

  }
</div>

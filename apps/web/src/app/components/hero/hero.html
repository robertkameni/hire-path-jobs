<section class="flex flex-col items-center gap-6 sm:gap-8 py-10 sm:py-12 px-4 sm:px-6">
  <h1 class="text-3xl sm:text-5xl lg:text-[56px] font-extrabold text-white text-center leading-tight">Stop applying blindly...</h1>
  <div
    class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full max-w-2xl
           p-3 sm:p-4 bg-[#0a1a0d] border border-[#00c752]/30 rounded-xl
           shadow-[0_0_20px_rgba(0,199,82,0.2)]"
  >
    <input
      #urlInput
      type="text"
      placeholder="Paste job posting URL here..."
      [value]="jobUrl()"
      (input)="jobUrl.set(urlInput.value)"
      (keyup.enter)="handleAnalyze()"
      class="flex-1 bg-transparent text-white text-sm sm:text-base outline-none
             placeholder:text-[#94a3b8] px-2 py-2 sm:py-0"
    >
    <button
      type="button"
      (click)="handleAnalyze()"
      [disabled]="analysis.isLoading() ||  (!jobUrl().trim() && !jobText().trim()) "
      class="w-full sm:w-auto flex items-center justify-center gap-2
             px-5 sm:px-8 py-3 sm:py-0 h-11 font-semibold
             bg-[#00c752] text-[#04110a] rounded-lg
             hover:text-white transition-colors cursor-pointer
             disabled:opacity-50 disabled:cursor-not-allowed"
    >
      @if (analysis.isLoading()) {
      <span>Analyzing...</span>
      } @else {
      <span>Analyze</span>
      }
    </button>
  </div>

  <div class="w-full max-w-2xl">
    @if (analysis.needsJobText()) {
    <div class="mt-4 p-4 rounded-xl border border-[#ffab00]/30 bg-[#1a1406] text-[#ffab00] text-sm">
      This site blocks automatic extraction. Paste the job description below and try again.
    </div>
    }

    <details
      class="mt-4"
      [open]="isJobTextOpen()"
      (toggle)="onToggle($event)"
    >
      <summary class="cursor-pointer text-gray-300 text-sm select-none">Paste job description (only if needed)</summary>
      <textarea
        #jobTextInput
        rows="10"
        placeholder="Paste only the job description section (Responsibilities/Requirements)."
        (input)="jobText.set(jobTextInput.value)"
        [value]="jobText()"
        class="mt-3 w-full bg-[#0a1a0d] border border-white/10 rounded-xl p-3 text-gray-100 text-sm outline-none"
      ></textarea>
      <div class="mt-2 text-xs text-gray-400">Tip: You usually don't need to paste the whole page,just the description text.</div>
    </details>
  </div>
</section>
